# Databricks App Configuration
command: ['python', 'app.py']

# Static files configuration
static_files:
  - source_path: static
    url_path: /

# Permissions for volume access
permissions:
  - level: CAN_USE
    service_principal_name: "gainwell-main-app"
    
# OAuth scopes needed for volume access
oauth_scopes:
  - all-apis